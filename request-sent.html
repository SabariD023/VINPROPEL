<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Received - VINPROPEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0071DC;
            --primary-light: #44a3ff;
            --success: #16BF78;
            --dark: #0f172a;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.85);
            --grey-dark: #3F4656;
            --grey: #6C7486;
            --grey-light: #CDD9ED;
            --sand: #fbbf24;
            --sand-light: #fbbf24;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f5f9;
            background-image:
                radial-gradient(at 0% 0%, rgba(0, 113, 220, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(22, 191, 120, 0.05) 0px, transparent 50%);
            margin: 0;
            overflow: hidden;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 4rem;
            border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 600px;
            width: 100%;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-header {
            margin-bottom: 3.5rem;
        }

        .status-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--dark);
            margin: 0 0 0.75rem 0;
            letter-spacing: -0.02em;
        }

        .status-header p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* Order Button Styles ported */
        .order {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border: 0;
            background: var(--dark);
            position: relative;
            height: 63px;
            width: 240px;
            padding: 0;
            outline: none;
            cursor: pointer;
            border-radius: 32px;
            -webkit-mask-image: -webkit-radial-gradient(white, black);
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
        }

        .order span {
            --o: 1;
            position: absolute;
            left: 0;
            right: 0;
            text-align: center;
            top: 19px;
            line-height: 24px;
            color: var(--white);
            font-size: 16px;
            font-weight: 600;
            opacity: var(--o);
            transition: opacity 0.3s ease;
        }

        .order span.default {
            transition-delay: 0.3s;
        }

        .order span.success {
            --offset: 16px;
            --o: 0;
        }

        .order span.success svg {
            width: 12px;
            height: 10px;
            display: inline-block;
            vertical-align: top;
            fill: none;
            margin: 7px 0 0 4px;
            stroke: var(--success);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 16px;
            stroke-dashoffset: var(--offset);
            transition: stroke-dashoffset 0.3s ease;
        }

        .order:active {
            transform: scale(0.96);
        }

        .order .lines {
            opacity: 0;
            position: absolute;
            height: 3px;
            background: var(--white);
            border-radius: 2px;
            width: 6px;
            top: 30px;
            left: 100%;
            box-shadow: 15px 0 0 var(--white), 30px 0 0 var(--white), 45px 0 0 var(--white), 60px 0 0 var(--white), 75px 0 0 var(--white), 90px 0 0 var(--white), 105px 0 0 var(--white), 120px 0 0 var(--white), 135px 0 0 var(--white), 150px 0 0 var(--white), 165px 0 0 var(--white), 180px 0 0 var(--white), 195px 0 0 var(--white), 210px 0 0 var(--white), 225px 0 0 var(--white), 240px 0 0 var(--white), 255px 0 0 var(--white), 270px 0 0 var(--white), 285px 0 0 var(--white), 300px 0 0 var(--white), 315px 0 0 var(--white), 330px 0 0 var(--white);
        }

        .order .back,
        .order .box {
            --start: var(--white);
            --stop: var(--grey-light);
            border-radius: 2px;
            background: linear-gradient(var(--start), var(--stop));
            position: absolute;
        }

        .order .truck {
            width: 60px;
            height: 41px;
            left: 100%;
            z-index: 1;
            top: 11px;
            position: absolute;
            transform: translateX(24px);
        }

        .order .truck:before,
        .order .truck:after {
            --r: -90deg;
            content: "";
            height: 2px;
            width: 20px;
            right: 58px;
            position: absolute;
            display: block;
            background: var(--white);
            border-radius: 1px;
            transform-origin: 100% 50%;
            transform: rotate(var(--r));
        }

        .order .truck:before {
            top: 4px;
        }

        .order .truck:after {
            --r: 90deg;
            bottom: 4px;
        }

        .order .truck .back {
            left: 0;
            top: 0;
            width: 60px;
            height: 41px;
            z-index: 1;
        }

        .order .truck .front {
            overflow: hidden;
            position: absolute;
            border-radius: 2px 9px 9px 2px;
            width: 26px;
            height: 41px;
            left: 60px;
        }

        .order .truck .front:after {
            content: "";
            position: absolute;
            display: block;
            border-radius: 2px 9px 9px 2px;
            background: var(--primary);
            width: 24px;
            height: 41px;
            right: 0;
        }

        .order .truck .front .window {
            overflow: hidden;
            border-radius: 2px 8px 8px 2px;
            background: var(--primary-light);
            transform: perspective(4px) rotateY(3deg);
            width: 22px;
            height: 41px;
            position: absolute;
            left: 2px;
            top: 0;
            z-index: 1;
            transform-origin: 0 50%;
        }

        .order .truck .front .window:before {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 14px;
            background: var(--dark);
        }

        .order .truck .light {
            width: 3px;
            height: 8px;
            left: 83px;
            transform-origin: 100% 50%;
            position: absolute;
            border-radius: 2px;
            transform: scaleX(0.8);
            background: #f0dc5f;
        }

        .order .truck .light:before {
            content: "";
            height: 4px;
            width: 7px;
            opacity: 0;
            transform: perspective(2px) rotateY(-15deg) scaleX(0.94);
            position: absolute;
            transform-origin: 0 50%;
            left: 3px;
            top: 50%;
            margin-top: -2px;
            background: linear-gradient(90deg, #f0dc5f, rgba(240, 220, 95, 0.7), rgba(240, 220, 95, 0));
        }

        .order .truck .light.top {
            top: 4px;
        }

        .order .truck .light.bottom {
            bottom: 4px;
        }

        .order .box {
            --start: var(--sand-light);
            --stop: var(--sand);
            width: 21px;
            height: 21px;
            right: 100%;
            top: 21px;
        }

        .order .box:before,
        .order .box:after {
            content: "";
            top: 10px;
            position: absolute;
            left: 0;
            right: 0;
        }

        .order .box:before {
            height: 3px;
            margin-top: -1px;
            background: rgba(0, 0, 0, 0.1);
        }

        .order.animate .default {
            --o: 0;
            transition-delay: 0s;
        }

        .order.animate .success {
            --offset: 0;
            --o: 1;
            transition-delay: 7s;
        }

        .order.animate .success svg {
            transition-delay: 7.3s;
        }

        .order.animate .truck {
            animation: truck 10s ease forwards;
        }

        .order.animate .truck:before {
            animation: door1 2.4s ease forwards 0.3s;
        }

        .order.animate .truck:after {
            animation: door2 2.4s ease forwards 0.6s;
        }

        .order.animate .truck .light:before {
            animation: light 10s ease forwards;
        }

        .order.animate .box {
            animation: box 10s ease forwards;
        }

        .order.animate .lines {
            animation: lines 10s ease forwards;
        }

        @keyframes truck {

            10%,
            30% {
                transform: translateX(-164px);
            }

            40% {
                transform: translateX(-104px);
            }

            60% {
                transform: translateX(-224px);
            }

            75%,
            100% {
                transform: translateX(24px);
            }
        }

        @keyframes lines {

            0%,
            30% {
                opacity: 0;
                transform: scaleY(0.7) translateX(0);
            }

            35%,
            65% {
                opacity: 1;
            }

            70% {
                opacity: 0;
            }

            100% {
                transform: scaleY(0.7) translateX(-400px);
            }
        }

        @keyframes light {

            0%,
            30% {
                opacity: 0;
                transform: perspective(2px) rotateY(-15deg) scaleX(0.88);
            }

            40%,
            100% {
                opacity: 1;
                transform: perspective(2px) rotateY(-15deg) scaleX(0.94);
            }
        }

        @keyframes door1 {

            30%,
            50% {
                transform: rotate(32deg);
            }
        }

        @keyframes door2 {

            30%,
            50% {
                transform: rotate(-32deg);
            }
        }

        @keyframes box {

            8%,
            10% {
                transform: translateX(40px);
                opacity: 1;
            }

            25% {
                transform: translateX(112px);
                opacity: 1;
            }

            26% {
                transform: translateX(112px);
                opacity: 0;
            }

            27%,
            100% {
                transform: translateX(0px);
                opacity: 0;
            }
        }

        .back-link {
            margin-top: 4rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            opacity: 0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.75rem 1.5rem;
            border-radius: 100px;
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .back-link.show {
            opacity: 1;
            transform: translateY(0);
        }

        .back-link:hover {
            transform: translateX(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="main-card">
        <div class="status-header">
            <h1>Request Confirmed</h1>
            <p id="sub-status">Transmitting to Engineering Hub...</p>
        </div>

        <button class="order">
            <span class="default">Submitting Inquiry</span>
            <span class="success">Request Sent Sucessfully
                <svg viewbox="0 0 12 10">
                    <polyline points="1.5 6 4.5 9 10.5 1"></polyline>
                </svg>
            </span>
            <div class="box"></div>
            <div class="truck">
                <div class="back"></div>
                <div class="front">
                    <div class="window"></div>
                </div>
                <div class="light top"></div>
                <div class="light bottom"></div>
            </div>
            <div class="lines"></div>
        </button>

        <a href="index.html" class="back-link" id="backLink">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Return to Homepage
        </a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            const $button = $('.order');
            const $subStatus = $('#sub-status');
            const $backLink = $('#backLink');

            // Auto-trigger animation
            setTimeout(() => {
                if (!$button.hasClass('animate')) {
                    $button.addClass('animate');

                    setTimeout(() => $subStatus.text("Packing technical specifications..."), 1000);
                    setTimeout(() => $subStatus.text("Dispatched via secure terminal..."), 4000);
                    setTimeout(() => {
                        $subStatus.text("Mission Accomplished! Engineers notified.");
                        $subStatus.css('color', '#16BF78');
                        $backLink.addClass('show');
                    }, 7500);
                }
            }, 800);
        });
    </script>
</body>

</html>
